# Single-package repo: declaring the root keeps pnpm happy treating this file as
# a workspace (pnpm requires a non-empty "packages" field once this file exists).
packages:
  - '.'

# The Railway build installs a newer pnpm whose supply-chain policy rejects any
# dependency published within the last 24h (minimumReleaseAge gate). playwright
# and playwright-core 1.61.0 are brand-new official Microsoft packages — and
# match the mcr.microsoft.com/playwright base image — so exempt just those two
# from the gate while leaving it active for every other dependency.
minimumReleaseAgeExclude:
  - playwright
  - playwright-core

# pnpm 10 blocks dependency postinstall (build) scripts by default. sharp (used
# by Next.js image optimization) and unrs-resolver (eslint resolver) need their
# native-binary build scripts to run, so approve just those two.
onlyBuiltDependencies:
  - sharp
  - unrs-resolver
